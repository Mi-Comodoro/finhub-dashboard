name: Deploy Nuxt SSR

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux, X64]
    environment: develop

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Compilar Nuxt SSR
        env:
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
          FB_API_KEY: ${{ secrets.FB_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.FB_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.FB_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FB_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FB_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_MEASUREMENT_ID: ${{ secrets.FB_MEASUREMENT_ID }}
          NUXT_TELEMETRY_DISABLED: 1
          NODE_OPTIONS: '--max-old-space-size=4096'
          # FORZAR el preset de servidor independiente de Node para garantizar index.mjs
          NITRO_PRESET: node-server
        run: |
          pnpm build

          echo "=== Contenido dentro de .output/server ==="
          if [ -d "./.output/server" ]; then
            ls -la ./.output/server
          else
            echo "La carpeta .output/server no existe"
          fi

          # Validar el archivo ejecutable final
          if [ -f "./.output/server/index.mjs" ]; then
            echo "✅ Archivo index.mjs de producción verificado con éxito."
          elif [ -f "./.output/server/index.js" ]; then
            echo "✅ Archivo index.js de producción verificado con éxito."
          else
            echo "❌ ERROR: No se encontró el archivo ejecutable principal en .output/server/"
            exit 1
          fi

      - name: Crear directorio destino si no existe
        run: mkdir -p /var/www/intranet/micomodoro-app

      - name: Limpiar deploy anterior
        run: rm -rf /var/www/intranet/micomodoro-app/.output

      - name: Copiar archivos productivos al servidor
        run: |
          # Copia segura de la carpeta de compilación y la configuración de PM2
          cp -rp .output /var/www/intranet/micomodoro-app/
          cp ecosystem.config.js /var/www/intranet/micomodoro-app/

      - name: Reiniciar aplicacion con PM2
        run: |
          cd /var/www/intranet/micomodoro-app
          export PM2_HOME=/home/jarvis/.pm2

          # Verificar qué extensión quedó en la carpeta productiva final para corregir PM2 si es necesario
          if [ -f "./.output/server/index.js" ] && [ -f "ecosystem.config.js" ]; then
            echo "Ajustando script en ecosystem.config.js a index.js..."
            sed -i 's/index.mjs/index.js/g' ecosystem.config.js
          fi

          if pm2 show micomodoro > /dev/null 2>&1; then
            echo "🔄 La aplicación ya existe en PM2. Reiniciando..."
            pm2 restart ecosystem.config.js --update-env
          else
            echo "🚀 Aplicación nueva. Registrando en PM2..."
            pm2 start ecosystem.config.js
          fi
          pm2 save
