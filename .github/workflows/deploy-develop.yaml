name: Deploy Nuxt SSR

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          nvm install 22
          nvm use 22

          node -v
          npm -v

      - name: Instalar pnpm
        run: npm install -g pnpm

      - name: Permitir build scripts pnpm
        run: pnpm config set onlyBuiltDependencies false

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Compilar Nuxt SSR
        run: pnpm build

      - name: Crear directorio destino
        run: |
          mkdir -p /var/www/intranet/micomodoro-app

      - name: Limpiar deploy anterior
        run: |
          rm -rf /var/www/intranet/micomodoro-app/.output

      - name: Copiar build compilado
        run: |
          cp -r .output /var/www/intranet/micomodoro-app/

      - name: Copiar configuracion PM2
        run: |
          cp ecosystem.config.cjs /var/www/intranet/micomodoro-app/

      - name: Reiniciar aplicacion con PM2
        run: |
          cd /var/www/intranet/micomodoro-app

          pm2 reload ecosystem.config.cjs --update-env || \
          pm2 start ecosystem.config.cjs

          pm2 save
