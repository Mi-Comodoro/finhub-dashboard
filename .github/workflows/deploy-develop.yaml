name: Deploy Nuxt SSR

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux, X64]
    environment: develop

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Compilar Nuxt SSR
        env:
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
          FB_API_KEY: ${{ secrets.FB_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.FB_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.FB_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FB_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FB_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_MEASUREMENT_ID: ${{ secrets.FB_MEASUREMENT_ID }}
          # Forzar a Nuxt/TypeScript a no detener el build por advertencias menores
          NUXT_TELEMETRY_DISABLED: 1
          NODE_OPTIONS: '--max-old-space-size=4096' # Evita caídas por falta de memoria RAM
        run: |
          # Ejecutar la compilación mostrando errores detallados
          pnpm build

          # Listar qué carpetas se crearon en el espacio de trabajo para diagnosticar
          echo "=== Contenido del directorio actual ==="
          ls -la

          if [ ! -f "./.output/server/index.mjs" ]; then
            echo "❌ ERROR: Nuxt no generó el archivo index.mjs de producción."
            exit 1
          fi

      - name: Crear directorio destino si no existe
        run: mkdir -p /var/www/intranet/micomodoro-app

      - name: Copiar archivos productivos al servidor
        run: |
          # Usamos rsync para asegurar que se incluyan archivos ocultos (.) de forma segura
          # Si rsync no está instalado, cp -a copia la estructura exacta preservando permisos
          rsync -av .output/ /var/www/intranet/micomodoro-app/.output/ || cp -a .output /var/www/intranet/micomodoro-app/

          # Copiar la configuración de PM2
          cp ecosystem.config.js /var/www/intranet/micomodoro-app/

          # Validación de existencia real en el destino final
          if [ ! -f "/var/www/intranet/micomodoro-app/.output/server/index.mjs" ]; then
            echo "❌ ERROR: Los archivos productivos no se encuentran en la ruta destino."
            exit 1
          fi

      - name: Reiniciar aplicacion con PM2
        run: |
          cd /var/www/intranet/micomodoro-app
          export PM2_HOME=/home/jarvis/.pm2

          if pm2 show micomodoro > /dev/null 2>&1; then
            echo "🔄 La aplicación ya está registrada. Reiniciando..."
            pm2 restart ecosystem.config.js --update-env
          else
            echo "🚀 Aplicación nueva. Registrando en PM2..."
            pm2 start ecosystem.config.js
          fi
          pm2 save
